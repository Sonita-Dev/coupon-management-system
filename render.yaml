services:
  - type: web
    name: coupon-management-system
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: Coupon Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: RUN_MIGRATIONS
        value: "true"
      - key: SEED_ADMIN_ON_BOOT
        value: "true"
      - key: SEED_COUPONS_ON_BOOT
        value: "true"
      - key: ADMIN_EMAIL
        value: admin@gmail.com
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_PASSWORD
        sync: false
